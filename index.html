<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота: JavaScript Classes</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .task-block { background: white; border-left: 4px solid #3498db; padding: 15px 20px; margin-bottom: 20px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .task-block h3 { margin-top: 0; color: #2980b9; font-size: 16px; }
        input { margin: 5px 5px 10px 0; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; background-color: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        .date-info { display: inline-block; background: #e8f4f8; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
    </style>
</head>
<body onload="startFloatingText()"> <h2>Лабораторна робота: String, Date, Number, Math</h2>

    <div class="task-block">
        <h3>Завдання 5. Поточна дата та час</h3>
        <button onclick="showCurrentDateTime()">Показати поточну дату</button>
    </div>

    <div class="task-block">
        <h3>Завдання 6, 7, 8, 11. Обчислення з датою</h3>
        <div class="date-info">Встановлена дата: 17.08.2026</div><br>
        <button onclick="showBirthDayOfWeek()">День тижня (Завдання 6)</button>
        <button onclick="showPastBirthdays()">Минулі роки (Завдання 7)</button>
        <button onclick="showFutureBirthday()">Через 3 роки (Завдання 8)</button>
        <button onclick="showNumberSystems()">Системи числення (Завдання 11)</button>
    </div>

    <div class="task-block">
        <h3>Завдання 9. Обчислення інтервалу часу</h3>
        Час 1: <input type="number" id="h1" min="0" max="23" placeholder="Год"> : <input type="number" id="m1" min="0" max="59" placeholder="Хв"><br>
        Час 2: <input type="number" id="h2" min="0" max="23" placeholder="Год"> : <input type="number" id="m2" min="0" max="59" placeholder="Хв"><br>
        <button onclick="calculateTimeInterval()">Обчислити інтервал</button>
    </div>

    <div class="task-block">
        <h3>Завдання 10. Перевірка на число</h3>
        <input type="text" id="checkNumInput" placeholder="Введіть будь-який текст">
        <button onclick="isFieldANumber()">Перевірити вміст</button>
    </div>

    <div class="task-block">
        <h3>Завдання 12. Обчислення гіпотенузи</h3>
        Катет А: <input type="number" id="catA" placeholder="Довжина A"><br>
        Катет Б: <input type="number" id="catB" placeholder="Довжина B"><br>
        <button onclick="calculateHypotenuse()">Обчислити гіпотенузу</button>
    </div>

    <script>
        // ==========================================
        // ЗАВДАННЯ 1: Біжуча стрічка (Приклад 2)
        // ==========================================
        var floatStr = "Here may be your own text... ";
        var resTimer;
        function floatingText() {
            floatStr = floatStr.substring(1, floatStr.length) + floatStr.charAt(0);
            window.status = floatStr; // Відображається у статус-барі старих браузерів
            resTimer = setTimeout("floatingText()", 200);
        }
        function startFloatingText() { floatingText(); }

        // ==========================================
        // ЗАВДАННЯ 5: Вивід поточної дати у форматі
        // ==========================================
        function showCurrentDateTime() {
            let d = new Date();
            let day = d.getDate();
            let month = d.getMonth() + 1; // +1 бо місяці з 0
            let year = d.getFullYear();
            let hours = d.getHours();
            let minutes = d.getMinutes();
            
            // Форматування з нулями (09 замість 9)
            month = month < 10 ? '0' + month : month;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            alert("Сьогодні " + day + "/" + month + "/" + year + " " + hours + ":" + minutes);
        }

        // ==========================================
        // ДАНІ ДЛЯ ЗАВДАНЬ 6, 7, 8, 11
        // Встановлено: 17 серпня 2026 року
        // ==========================================
        const myYear = 2026; 
        const myMonth = 7;   // Серпень - це 7 (бо січень - це 0)
        const myDay = 17;    

        const daysOfWeek = ["Неділя", "Понеділок", "Вівторок", "Середа", "Четвер", "П'ятниця", "Субота"];

        // ЗАВДАННЯ 6: День народження
        function showBirthDayOfWeek() {
            let bDate = new Date(myYear, myMonth, myDay);
            alert("Ця дата припадає на такий день тижня: " + daysOfWeek[bDate.getDay()]);
        }

        // ЗАВДАННЯ 7: Дата у минулому (10, 12, 25, 38 років тому)
        function showPastBirthdays() {
            let pastYears = [10, 12, 25, 38];
            for (let i = 0; i < pastYears.length; i++) {
                let pastDate = new Date(myYear - pastYears[i], myMonth, myDay);
                alert(pastYears[i] + " років тому це був день: " + daysOfWeek[pastDate.getDay()]);
            }
        }

        // ЗАВДАННЯ 8: Дата через 3 роки
        function showFutureBirthday() {
            let futureDate = new Date(myYear + 3, myMonth, myDay);
            alert("Через 3 роки ця дата припаде на: " + daysOfWeek[futureDate.getDay()]);
        }

        // ==========================================
        // ЗАВДАННЯ 9: Інтервал між двома моментами
        // ==========================================
        function calculateTimeInterval() {
            let h1 = parseInt(document.getElementById('h1').value) || 0;
            let m1 = parseInt(document.getElementById('m1').value) || 0;
            let h2 = parseInt(document.getElementById('h2').value) || 0;
            let m2 = parseInt(document.getElementById('m2').value) || 0;

            let date1 = new Date(); date1.setHours(h1, m1, 0, 0);
            let date2 = new Date(); date2.setHours(h2, m2, 0, 0);

            let diffInMinutes = Math.abs(date2 - date1) / 60000;
            
            let resHours = Math.floor(diffInMinutes / 60);
            let resMinutes = diffInMinutes % 60;
            
            alert("Інтервал: " + resHours + " год " + resMinutes + " хв");
        }

        // ==========================================
        // ЗАВДАННЯ 10: Перевірка вмісту поля на число
        // ==========================================
        function isFieldANumber() {
            let val = document.getElementById('checkNumInput').value;
            if (val.trim() === "" || isNaN(val)) {
                alert("Помилка: це НЕ число!");
            } else {
                alert("Успіх: це число!");
            }
        }

        // ==========================================
        // ЗАВДАННЯ 11: Системи числення
        // ==========================================
        function showNumberSystems() {
            // Реальний номер місяця для математичної суми (myMonth + 1)
            let sum = new Number(myDay + (myMonth + 1) + myYear); 
            alert("Сума (17 + 8 + 2026) дорівнює: " + sum + "\n" +
                  "У двійковій: " + sum.toString(2) + "\n" +
                  "У шістнадцятковій: " + sum.toString(16));
        }

        // ==========================================
        // ЗАВДАННЯ 12: Довжина гіпотенузи
        // ==========================================
        function calculateHypotenuse() {
            let a = parseFloat(document.getElementById('catA').value);
            let b = parseFloat(document.getElementById('catB').value);
            
            if(isNaN(a) || isNaN(b) || a <= 0 || b <= 0) {
                alert("Введіть коректні додатні числа для катетів!");
                return;
            }

            let hypotenuse = Math.sqrt(Math.pow(a, 2) + Math.pow(b, 2));
            let resultNumber = new Number(hypotenuse);
            alert("Гіпотенуза дорівнює: " + resultNumber.toFixed(2));
        }
    </script>
</body>
</html>
