<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої API та Віджети</title>
    <!-- Підключення файлу стилів -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Лабораторна: Інтеграція API та Віджетів</h1>

    <div class="container">
        
        <!-- 1. YouTube Віджет -->
        <div class="card">
            <h3>1. YouTube Відео</h3>
            <p>Вбудований iframe-віджет програвача.</p>
            <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
        </div>

        <!-- 2. Google Maps Віджет -->
        <div class="card">
            <h3>2. Google Карти</h3>
            <p>Інтерактивна карта (м. Тернопіль).</p>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d81065.50284457424!2d25.520448499999998!3d49.5535165!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4730315307b225cb%3A0xc6e4b476e3d231de!2sTernopil%2C%20Ternopil%20Oblast%2C%20Ukraine%2C%2046000!5e0!3m2!1sen!2sus!4v1700000000000" loading="lazy"></iframe>
        </div>

        <!-- 3. REST API (Генератор порад) -->
        <div class="card">
            <h3>3. Advice API</h3>
            <p>Випадкова порада (JavaScript Fetch).</p>
            <div id="api-text" class="api-output advice-text">Натисніть кнопку...</div>
            <button onclick="fetchAdvice()">Отримати пораду</button>
        </div>

        <!-- 4. REST API (Погода) -->
        <div class="card">
            <h3>4. Weather API</h3>
            <p>Поточна погода (м. Тернопіль).</p>
            <div id="weather-text" class="api-output weather-text">Отримання даних...</div>
            <button onclick="fetchWeather()">Оновити погоду</button>
        </div>

    </div>

    <script>
        // Функція для Advice API
        function fetchAdvice() {
            const textElement = document.getElementById('api-text');
            textElement.innerText = "Завантаження..."; 

            fetch('https://api.adviceslip.com/advice')
                .then(response => response.json())
                .then(data => {
                    textElement.innerText = `"${data.slip.advice}"`;
                })
                .catch(error => {
                    textElement.innerText = "Помилка з'єднання.";
                });
        }

        // Функція для Weather API
        function fetchWeather() {
            const weatherElement = document.getElementById('weather-text');
            weatherElement.innerHTML = "Завантаження...";

            fetch('https://api.open-meteo.com/v1/forecast?latitude=49.55&longitude=25.52&current_weather=true')
                .then(response => response.json())
                .then(data => {
                    const temp = data.current_weather.temperature;
                    const wind = data.current_weather.windspeed;
                    
                    weatherElement.innerHTML = `
                        <div><span class="temp">${temp}°C</span></div>
                        <div class="wind">Вітер: ${wind} км/год</div>
                    `;
                })
                .catch(error => {
                    weatherElement.innerHTML = "Помилка оновлення погоди.";
                });
        }

        fetchAdvice();
        fetchWeather();
    </script>

</body>
</html>
