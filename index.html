<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивний Анімований Банер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Контейнер банера зі статичним фоном -->
    <div class="banner">
        
        <!-- Три анімовані текстові написи -->
        <div class="text-content">
            <h2 class="text-fade">Технології Майбутнього</h2>
            <p class="text-slide">Сучасні підходи до розробки програмного забезпечення</p>
            <span class="text-zoom">Приєднуйтесь до нашої команди</span>
        </div>

        <!-- Три анімовані PNG-рисунки -->
        <div class="images-content">
            <img src="icon1.png" alt="Технологія 1" class="img-float">
            <img src="icon2.png" alt="Технологія 2" class="img-spin">
            <img src="icon3.png" alt="Технологія 3" class="img-pulse">
        </div>
        
    </div>

</body>
</html>
